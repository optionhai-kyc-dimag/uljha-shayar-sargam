<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सोनू सरगम - उलझा शायर ए सरगम</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 90%; }
        img { width: 100%; max-width: 500px; border-radius: 10px; }
        h1 { color: #333; }
        p { font-size: 1.3rem; font-weight: bold; color: #444; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>सोनू सरगम (Sonu Sargam)</h1>
        <img src="uljhashayarsargam.jpg" alt="Sonu Sargam Poetry">
        <p>जो आज है वो कल नहीं रहता,<br>कोई भी शख्स एक पे टिका नहीं रहता!!</p>
        <p style="color: #888;">- उलझा शायर ए सरगम</p>
    </div>
</body>
</html>
